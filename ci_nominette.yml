name: 42 C CI

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate Formatting & Norm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatter & norminette
        run: |
          python -m pip install --upgrade pip
          pip install norminette c-formatter-42

      - name: Run formatter check
        run: |
          find . -type f \( -name "*.c" -o -name "*.h" \) \
          -not -path "./build/*" \
          -exec c_formatter_42 {} \;

          git diff --exit-code

      - name: Run norminette
        run: norminette

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install formatter
        run: |
          python -m pip install --upgrade pip
          pip install c-formatter-42

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            valgrind

      - name: Format source before build
        run: |
          find . -type f \( -name "*.c" -o -name "*.h" \) \
          -not -path "./build/*" \
          -exec c_formatter_42 {} \;

      - name: Build
        run: make

      - name: Run tests
        run: make test

      - name: Run valgrind
        run: |
          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            ./program
